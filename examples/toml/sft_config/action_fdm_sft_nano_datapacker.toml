# action_fdm_sft_nano_datapacker — Bridge LeRobot FDM SFT
# DataPackerDataLoader + BridgeFDMDataPacker variant of action_fdm_sft_nano.
# Inherits model / optimizer / scheduler / trainer / checkpoint from the base
# experiment; only the dataloader pipeline is swapped (max_batch_size=64,
# token-budget packing).
#
# The [dataloader_train] section is intentionally omitted — DataPackerDataLoader
# uses different ctor kwargs (max_batch_size / max_tokens) than the
# IterativeJointDataLoader fields modeled in SFTExperimentConfig. Adjust them
# via CLI extra overrides if needed, e.g.:
#   -- dataloader_train.max_batch_size=64 dataloader_train.max_tokens=999999

[job]
task         = "vfm"
experiment   = "action_fdm_sft_nano_datapacker"
project      = "cosmos3_action_bridge"
group        = "action_bridge"
name         = "action_fdm_sft_nano_datapacker"
wandb_mode   = "offline"

[model]
max_num_tokens_after_packing = -1
joint_attn_implementation    = "two_way"

[model.ema]
enabled         = true
rate            = 0.1
iteration_shift = 0

[model.parallelism]
use_torch_compile               = true
compile_dynamic                 = true
data_parallel_shard_degree      = 8
data_parallel_replicate_degree  = 1
context_parallel_shard_degree   = 1
cfg_parallel_shard_degree       = 1
precision                       = "bfloat16"

[model.activation_checkpointing]
mode                = "full"
save_ops_regex      = ["fmha"]
preserve_rng_state  = true
determinism_check   = "default"

[model.tokenizer]
vae_path = "${oc.env:WAN_VAE_PATH}"

[optimizer]
betas         = [0.9, 0.99]
eps           = 1.0e-8
fused         = true
keys_to_select = [
    "moe_gen",
    "time_embedder",
    "vae2llm",
    "llm2vae",
    "action2llm",
    "llm2action",
    "action_modality_embed",
]
lr            = 2.0e-4
weight_decay  = 0.05

[optimizer.lr_multipliers]
action2llm            = 5.0
action_modality_embed = 5.0
llm2action            = 5.0

[scheduler]
cycle_lengths      = [20000]
f_max              = [0.4]
f_min              = [0.05]
f_start            = [1.0e-6]
verbosity_interval = 0
warm_up_steps      = [100]

[trainer]
distributed_parallelism = "fsdp"
grad_accum_iter         = 1
logging_iter            = 50
max_iter                = 16000

[trainer.callbacks.compile_tokenizer]
compile_after_iterations = 3
enabled                  = true
warmup_resolutions       = ["480"]

[trainer.callbacks.grad_clip]
clip_norm    = 1.0
force_finite = true

[checkpoint]
keys_to_skip_loading = [
    "net_ema.",
    "action2llm",
    "llm2action",
    "action_modality_embed",
    "action_pos_embed",
]
load_path = "${oc.env:BASE_CHECKPOINT_PATH}"
save_iter = 100
