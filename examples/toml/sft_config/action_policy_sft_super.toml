# action_policy_sft_super — LIBERO action-policy SFT, Qwen3-VL-32B LoRA (super tier)
# Consumed by cosmos_framework.configs.toml_config.sft_config.load_experiment_from_toml.
# Mirrors examples/toml/launch_action_policy_sft_super.toml (the legacy
# interface_toml schema). DP=4 / CP=2 → WORLD_SIZE = 8.

[job]
task         = "vfm"
experiment   = "action_policy_sft_super"
project      = "cosmos3_action_super"
group        = "sft"
name         = "action_policy_sft_super"
wandb_mode   = "online"

[model]
max_num_tokens_after_packing = 16384
joint_attn_implementation    = "two_way"
lora_enabled                 = true
lora_rank                    = 16
lora_alpha                   = 32
lora_target_modules          = "q_proj_moe_gen,k_proj_moe_gen,v_proj_moe_gen,o_proj_moe_gen"

[model.ema]
enabled         = false                                  # super uses LoRA, no EMA
rate            = 0.1
iteration_shift = 0

[model.parallelism]
use_torch_compile               = true
compile_dynamic                 = true
data_parallel_shard_degree      = 4                      # matches legacy dp_shard_size=4
data_parallel_replicate_degree  = 1
context_parallel_shard_degree   = 2                      # matches legacy cp_size=2
cfg_parallel_shard_degree       = 1
precision                       = "bfloat16"

[model.activation_checkpointing]
mode                = "full"
save_ops_regex      = ["fmha"]
preserve_rng_state  = true
determinism_check   = "default"

[model.tokenizer]
vae_path = "${oc.env:WAN_VAE_PATH}"

[optimizer]
betas          = [0.9, 0.99]
eps            = 1.0e-8
fused          = true
keys_to_select = ["lora_"]                               # train LoRA adapters only
lr             = 5.0e-5
weight_decay   = 0.05

[scheduler]
cycle_lengths      = [20000]
f_max              = [1.0]
f_min              = [0.0]
f_start            = [1.0e-6]
verbosity_interval = 0
warm_up_steps      = [500]

[trainer]
distributed_parallelism = "fsdp"
grad_accum_iter         = 1
logging_iter            = 1
max_iter                = 16000

[trainer.callbacks.compile_tokenizer]
compile_after_iterations = 3
enabled                  = true
warmup_resolutions       = ["256", "480", "720"]

[trainer.callbacks.grad_clip]
clip_norm    = 1.0
force_finite = true

[checkpoint]
keys_to_skip_loading = ["net_ema.", "lora_"]
load_path = "${oc.env:BASE_CHECKPOINT_PATH}"
save_iter = 100

[dataloader_train]
max_samples_per_batch = 64                               # matches legacy
# max_sequence_length omitted (None at experiment level)
seed                  = 42
