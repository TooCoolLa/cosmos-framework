# If set, measures and reports inference runtime (disables tqdm).
benchmark: false
cfgp_size: 0
# Directory for caching S3 checkpoints.
checkpoint_cache_dir: null
# Hugging Face checkpoint directory.
checkpoint_hf: null
# Checkpoint type.
checkpoint_type: null
# Compile with symbolic-shape kernels (maps to ``torch.compile(dynamic=...)``).
#
# Defaults to ``True`` for backward compatibility with training, which can
# see varying shapes across batches.  Setting to ``False`` produces faster
# kernels when the shapes are stable (e.g. single-prompt AR inference), at
# the cost of a recompile on shape change.
compile_dynamic: true
compiled_region: all
# Hydra config store module, Hydra config yaml file, or Hugging Face model json file.
config_file: cosmos_framework/configs/base/config.py
# Hydra config file type.
config_file_type: null
cp_size: 0
# Path to S3 credentials file for remote checkpoint loading.
credential_path: credentials/gcp_checkpoint.secret
# If True, enable debug outputs.
debug: false
# Fraction of device memory to use for model weights.
#
# Used for automatic sharding.
device_memory_utilization: 0.75
dp_replicate_size: 0
dp_shard_size: 0
# Hydra experiment name.
experiment: ''
# Hydra experiment overrides.
experiment_overrides: []
# Enable guardrails.
guardrails: false
# If True, catch and log errors instead of raising them.
keep_going: false
# Maximum total tokens per batch.  When set, samples are packed into
# batches by token count.
max_model_len: null
# Maximum number of sequences per batch.  When set, samples are packed into
# batches by number of sequences.
max_num_seqs: 1
# Approximate model size in bytes.
model_memory_bytes: null
model_size: null
# Offload guardrail models to CPU.
offload_guardrail_models: false
# Output directory.
output_dir: null
# Preset for automatic sharding.
parallelism_preset: latency
# Run profiler and save report to output directory.
profile: false
sample_overrides:
  # Number of action steps to predict.
  action_chunk_size: null
  # Path to action JSON file. Required for forward_dynamics mode.
  action_path: null
  # Vision aspect ratio. When None, image_edit preserves the input image's native
  # aspect ratio; all other modes default to 16:9.
  aspect_ratio: null
  # If True, use autoregressive per-frame generation.
  autoregressive: null
  # Blur transfer control configuration.
  blur: null
  # Camera trajectory string parsed by ``parse_camera_string``
  # (e.g. 'w-30,right-15,w-15'). Mutually exclusive with ``action_path``;
  # only valid for ``action_mode='forward_dynamics'``.
  camera_trajectory: null
  # Latent frame indices to condition on. Defaults to [0] for image, [0, 1] for video.
  condition_frame_indexes_vision: null
  # Whether to take the first or last ``max_frames`` of the conditioning
  # video when it is longer than needed. Defaults to ``"first"``. No effect
  # on image conditioning.
  condition_video_keep: null
  # Path to a JSON file of per-modality default sample fields. Overrides the built-in defaults.
  defaults_file: null
  # Depth transfer control configuration.
  depth: null
  # Action domain name passed to get_domain_id().
  domain_name: null
  # Template string for appending duration/fps to prompt. Use {duration} and {fps} placeholders.
  duration_template: null
  # Edge transfer control configuration.
  edge: null
  # Enable joint video+sound generation (t2vs mode). Requires a checkpoint with sound modules.
  enable_sound: null
  # Extra arguments.
  extra: null
  # Vision frames per second. Recommended range [10, 30]; quality may be degraded outside of this range.
  fps: null
  # Guidance scale for the diffusion model.
  guidance: null
  # Guidance interval for the diffusion model.
  guidance_interval: null
  # Quality of the saved image (0-100).
  image_save_quality: null
  # Target image height in pixels (aspect-ratio-preserving resize).
  image_size: null
  # Inverse template for duration/fps metadata in the negative prompt.
  inverse_duration_template: null
  # Inverse template for resolution metadata in the negative prompt.
  inverse_resolution_template: null
  # Maximum number of input frames to read.
  max_frames: null
  # Model name.
  model: null
  # Generation modality. When omitted, the VFM modality is inferred from ``vision_path`` and
  # ``num_frames``; action modes must be set explicitly.
  model_mode: null
  # Name of the sample.
  name: null
  # Negative prompt metadata mode: 'none', 'same', or 'inverse'.
  negative_metadata_mode: null
  # Negative prompt - describing what you don't want in the generated video.
  negative_prompt: null
  # Compatibility flag. If True and mode is 'none', mode is promoted to 'same'.
  negative_prompt_keep_metadata: null
  # If True, normalize the CFG output.
  normalize_cfg: null
  # Number of conditional frames from the previous chunk for autoregressive generation.
  num_conditional_frames: null
  # Number of frames from vision_path to condition on in the first chunk.
  # 0 = t2v (no conditioning), 1 = i2v, >1 = v2v.
  num_first_chunk_conditional_frames: null
  # Number of vision frames.
  #
  # Range by resolution: 256p: [24, 400], 480p: [24, 300], 720p/768p: [24, 200].
  # Image-only resolutions (e.g. 1080p) require num_frames=1.
  num_frames: null
  # Number of outputs to generate per sample.
  num_outputs: null
  # Number of steps for the diffusion model.
  num_steps: null
  # Number of video frames per autoregressive chunk.
  num_video_frames_per_chunk: null
  # Output directory.
  output_dir: null
  # Path to data pickle file.
  pickle_file: null
  # Text prompt for generation. Only one of 'prompt' or 'prompt_path' should be provided.
  prompt: null
  # Path to a .txt file containing the prompt. Only one of 'prompt' or 'prompt_path' should be provided.
  prompt_path: null
  # Advanced override for the OpenAI-compatible prompt upsampler endpoint URL.
  prompt_upsampler_endpoint_url: null
  # Maximum tokens generated by the prompt upsampler.
  prompt_upsampler_max_tokens: null
  # Native prompt upsampler OpenAI-style additive presence penalty (any sign).
  prompt_upsampler_presence_penalty: null
  # Native prompt upsampler CTRL/HF-style multiplicative repetition penalty (>0).
  prompt_upsampler_repetition_penalty: null
  # Optional integer seed for the native prompt upsampler's sampling RNG.
  prompt_upsampler_seed: null
  # Native prompt upsampler sampling temperature.
  prompt_upsampler_temperature: null
  # Native prompt upsampler top-k sampling limit.
  prompt_upsampler_top_k: null
  # Native prompt upsampler nucleus sampling probability.
  prompt_upsampler_top_p: null
  # Prompt upsampler variant. Defaults to the VFM model size for 8B/32B models.
  prompt_upsampler_variant: null
  # If True, replace the prompt with a dense JSON prompt.
  prompt_upsampling: null
  # Internal idempotency marker set after prompt upsampling has already run.
  prompt_upsampling_applied: null
  # Dimension of the raw action data. Required when action_path is not provided.
  raw_action_dim: null
  # Vision resolution.
  #
  # Defaults to model config resolution.
  resolution: null
  # Template string for appending resolution to prompt. Use {height} and {width} placeholders.
  resolution_template: null
  # Seed for the random number generator.
  seed: null
  # Segmentation transfer control configuration.
  seg: null
  # If True, all vision items in a transfer sample share one temporal mRoPE grid
  # (controlnet-style: control frame k and target frame k get the same temporal id).
  # Must match the regime the checkpoint was trained under — checkpoints trained with
  # the temporal-id-fix require True, ablation `*_no_temporal_share_*` checkpoints
  # require False. Defaults to True via `_TRANSFER_SAMPLE_DEFAULTS`.
  share_vision_temporal_positions: null
  # Shift in the UniPC sampler. Ignored when sampler='edm'.
  shift: null
  # If True, concatenate control video in the output.
  show_control_condition: null
  # If True, concatenate input video in the output.
  show_input: null
  # Post-shift sigma used to seed clean context frames into the KV cache under
  # diffusion_forcing AR inference. Overrides model.config.sigma_diffusion_forcing when set.
  # Ignored when causal_training_strategy != 'diffusion_forcing'.
  sigma_diffusion_forcing: null
  # Maximum sigma for the EDM sampler. Ignored when sampler='unipc'.
  sigma_max: null
  # Path to data tensors file.
  tensors_file: null
  # Quality of the saved video (0-10).
  video_save_quality: null
  # Path or URL to conditioning image/video.
  vision_path: null
  # World Scenario Map (hdmap_bbox) transfer control configuration.
  wsm: null
sampler: unipc
# If True, skip samples whose modality (e.g. action, sound) is not supported by the
# loaded model and emit a ``status='skip'`` output instead of raising. Useful for tests
# and examples that exercise multiple modalities against checkpoints with varying support.
skip_invalid_samples: false
tp_size: 1
use_cuda_graphs: false
# If True, use EMA weights. Otherwise, use regular weights.
use_ema_weights: true
# Whether to place pipeline vision decode on a spare local GPU when one is available.
use_separate_pipeline_vision_decode_gpu: false
# Whether to use torch compile.
use_torch_compile: true
# Discriminator.
variant: omni
# Number of warmup generations before each sample.
warmup: 0
